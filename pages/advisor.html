  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <h1>مستشار العطر <span class="gold-text">الذكي</span></h1>
      <p style="font-size:1.1rem; margin-top:10px;">دع الذكاء الاصطناعي يختار لك عطرك المثالي</p>
      <div class="breadcrumb" style="margin-top:15px;">
        <a href="../index.html">الرئيسية</a>
        <span>/</span>
        <span>المستشار الذكي</span>
      </div>
    </div>
  </div>

  <!-- Advisor Form -->
  <section class="section-padding">
    <div class="container">
      <div class="advisor-form fade-in">
        <form id="advisorForm">
          <div class="form-group">
            <label>الفئة العمرية</label>
            <select required>
              <option value="">اختر فئتك العمرية</option>
              <option>18 - 25 سنة</option>
              <option>26 - 35 سنة</option>
              <option>36 - 45 سنة</option>
              <option>46 - 55 سنة</option>
              <option>أكثر من 55 سنة</option>
            </select>
          </div>

          <div class="form-group">
            <label>نمط الشخصية</label>
            <select required>
              <option value="">اختر نمط شخصيتك</option>
              <option>كلاسيكي أنيق</option>
              <option>عصري جريء</option>
              <option>هادئ رومانسي</option>
              <option>رياضي نشيط</option>
              <option>غامض ساحر</option>
            </select>
          </div>

          <div class="form-group">
            <label>نوع المناسبة</label>
            <select required>
              <option value="">اختر نوع المناسبة</option>
              <option>يومي / عمل</option>
              <option>مناسبات رسمية</option>
              <option>سهرات ومساء</option>
              <option>مناسبات خاصة / أعراس</option>
              <option>إهداء</option>
            </select>
          </div>

          <div class="form-group">
            <label>درجة الثبات المطلوبة</label>
            <select required>
              <option value="">اختر درجة الثبات</option>
              <option>خفيف (2-4 ساعات)</option>
              <option>متوسط (4-8 ساعات)</option>
              <option>قوي (8-12 ساعة)</option>
              <option>فائق الثبات (+12 ساعة)</option>
            </select>
          </div>

          <div class="form-group">
            <label>نوع الرائحة المفضل</label>
            <select required>
              <option value="">اختر نوع الرائحة</option>
              <option>شرقي / عود</option>
              <option>زهري / ورد</option>
              <option>خشبي / صندل</option>
              <option>حمضيات / منعش</option>
              <option>مسك / عنبر</option>
              <option>توابل / زعفران</option>
            </select>
          </div>

          <div class="form-group">
            <label>الوقت / الموسم</label>
            <select required>
              <option value="">اختر الوقت المناسب</option>
              <option>صيفي / نهاري</option>
              <option>شتوي / دافئ</option>
              <option>مسائي</option>
              <option>لجميع الأوقات</option>
            </select>
          </div>

          <div style="text-align:center; margin-top:30px;">
            <button type="submit" class="btn btn-filled" style="font-size:1.1rem; padding:16px 50px;">اقترح لي عطري المثالي</button>
          </div>
        </form>
      </div>

      <!-- AI Result -->
      <div class="ai-result" id="aiResult">
        <div style="font-size:3rem; margin-bottom:15px;">✨</div>
        <h2>عطرك المثالي هو:</h2>
        <div class="gold-line"></div>
        <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?w=300&h=400&fit=crop" alt="العطر المقترح">
        <h3 id="resultName" style="font-size:1.8rem; color:var(--gold); margin-bottom:10px;">عود الملوك</h3>
        <p id="resultDesc" style="max-width:500px; margin:0 auto 20px;">وصف العطر</p>
        <div id="resultPrice" style="font-size:1.5rem; color:var(--gold); font-weight:700; font-family:var(--font-heading); margin-bottom:25px;">٤٥٠ ر.س</div>
        <a href="order.html" class="btn btn-filled">اطلب الآن</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
